<div class="firefly" style="top:15%;left:90%;animation-delay:8s;"></div>

</div>

<script>
document.getElementById("surveyForm").addEventListener("submit",function(e){

    e.preventDefault();

    document.querySelector(".survey-container").style.display="none";

    const thank=document.getElementById("thankYouMessage");
    const text=document.getElementById("textMessage");
    const tulip=document.getElementById("tulipImage");
    const fire=document.getElementById("fireflyContainer");

    thank.classList.remove("hidden");
    thank.classList.add("show");

    setTimeout(function(){

        thank.classList.remove("show");
        thank.classList.add("hidden");

        tulip.classList.remove("hidden");
        text.classList.remove("hidden");
        text.classList.add("show");
        fire.classList.remove("hidden");

    },2000);

});
</script>
